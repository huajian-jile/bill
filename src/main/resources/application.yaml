spring:
  application:
    name: bill
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:postgresql://localhost:5432/bill
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Python 先导入时库非空且无 flyway 表；默认 baseline-version=1 会跳过 V1，导致 app_users 未建却执行 V2
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 9000

app:
  # 脚本改内容/重命名后 checksum 不一致时：先执行 mvn flyway:repair，或临时设为 true 启动一次再改回 false
  flyway:
    repair-before-migrate: false
  jwt:
    secret: "ChangeThisToAVeryLongSecretKeyForHS256AlgorithmMin256Bits!!"
    expiration-ms: 86400000
  # 首次启动且库中不存在该账号时自动创建管理员（账号须为 10 位数字，与登录一致）
  bootstrap:
    admin-username: "2658373594"
    admin-password: "13421342sS"
    admin-phone: "13979314684"
