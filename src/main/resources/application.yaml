spring:
  application:
    name: bill
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  datasource:
    url: jdbc:postgresql://localhost:5432/bill
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Python 先导入时库非空且无 flyway 表；默认 baseline-version=1 会跳过 V1，导致 app_users 未建却执行 V2
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 9000

app:
  # 仅在 flyway_schema_history checksum 与脚本不一致时需临时设为 true；平时保持 false
  flyway:
    repair-before-migrate: false
  jwt:
    secret: "ChangeThisToAVeryLongSecretKeyForHS256AlgorithmMin256Bits!!"
    expiration-ms: 86400000
  # 首次启动且库中不存在该手机号账号时，自动创建管理员（账号=手机号）。请改为真实号码并修改密码。
  bootstrap:
    admin-mobile: "13800138000"
    admin-password: "admin123"
